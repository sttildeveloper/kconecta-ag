name: kconecta

services:
  app:
    container_name: kconecta
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8010:80"
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8010
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: kconecta_schema
      DB_USERNAME: root
      DB_PASSWORD: secret
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: kconecta_schema
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - db-data:/var/lib/mysql

  ollama:
    image: ollama/ollama:latest
    container_name: kconecta-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    # Si la PC de la oficina o de tu casa tiene GPU Nvidia, puedes descomentar estas líneas para acelerar la IA
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  db-data:
  ollama-data:
